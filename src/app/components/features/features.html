<section id="features" class="bg-white py-24">
  <div class="container-page">
    <div appReveal class="mx-auto max-w-3xl text-center">
      <span class="text-sm font-bold uppercase tracking-wider text-brand-600">{{ c().eyebrow }}</span>
      <h2 class="mt-3 font-display text-3xl font-extrabold text-navy-700 sm:text-4xl">
        {{ c().title }}
      </h2>
      <p class="mt-5 text-lg leading-relaxed text-navy-600">
        {{ c().intro }}
      </p>
    </div>

    <div class="mt-16 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
      @for (f of pagedFeatures(); track f.no; let i = $index) {
        <article [appReveal]="i" class="group relative rounded-3xl border border-cream-deep bg-white p-7 transition-all hover:-translate-y-1 hover:border-brand-200 hover:shadow-[0_24px_60px_-30px_rgba(237,125,49,0.5)]">
          <div class="flex items-start justify-between">
            <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-50 text-brand-600 transition-colors group-hover:bg-brand-500 group-hover:text-white">
              <app-icon [name]="f.icon" class="h-7 w-7" />
            </span>
            <span class="font-display text-3xl font-extrabold text-cream-deep transition-colors group-hover:text-brand-200">{{ f.no }}</span>
          </div>
          <h3 class="mt-5 font-display text-lg font-extrabold text-navy-700">{{ f.title }}</h3>
          <p class="mt-2 leading-relaxed text-navy-600">{{ f.desc }}</p>
        </article>
      }
    </div>

    <!-- pagination -->
    @if (totalPages() > 1) {
      <nav class="mt-12 flex items-center justify-center gap-2" aria-label="ترقيم المميزات">
        <button type="button" (click)="prev()" [disabled]="page() === 1"
          class="flex h-11 w-11 items-center justify-center rounded-full border border-cream-deep text-navy-700 transition-all hover:border-brand-300 hover:text-brand-600 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:border-cream-deep disabled:hover:text-navy-700 cursor-pointer"
          aria-label="السابق">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 6l6 6-6 6"/></svg>
        </button>

        @for (p of pages(); track p) {
          <button type="button" (click)="setPage(p)"
            class="h-11 min-w-11 rounded-full px-4 text-sm font-bold transition-all cursor-pointer"
            [class]="page() === p
              ? 'bg-brand-500 text-white shadow-lg shadow-brand-500/30'
              : 'border border-cream-deep text-navy-700 hover:border-brand-300 hover:text-brand-600'"
            [attr.aria-current]="page() === p ? 'page' : null">
            {{ p }}
          </button>
        }

        <button type="button" (click)="next()" [disabled]="page() === totalPages()"
          class="flex h-11 w-11 items-center justify-center rounded-full border border-cream-deep text-navy-700 transition-all hover:border-brand-300 hover:text-brand-600 disabled:cursor-not-allowed disabled:opacity-40 disabled:hover:border-cream-deep disabled:hover:text-navy-700 cursor-pointer"
          aria-label="التالي">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 6l-6 6 6 6"/></svg>
        </button>
      </nav>
    }
  </div>
</section>
