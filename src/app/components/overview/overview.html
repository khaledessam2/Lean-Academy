<section id="overview" class="relative bg-cream py-24">
  <div class="container-page">
    <div appReveal class="mx-auto max-w-3xl text-center">
      <span class="text-sm font-bold uppercase tracking-wider text-brand-600">{{ c().eyebrow }}</span>
      <h2 class="mt-3 font-display text-3xl font-extrabold text-navy-700 sm:text-4xl">
        {{ c().title }}
      </h2>
      <p class="mt-5 text-lg leading-relaxed text-navy-600">
        {{ c().intro }}
      </p>
    </div>

    <div class="mt-16 grid gap-6 md:grid-cols-3">
      @for (m of c().modes; track m.en; let i = $index) {
        <div [appReveal]="i" class="group relative overflow-hidden rounded-3xl bg-white p-8 shadow-[0_20px_60px_-30px_rgba(14,46,68,0.25)] ring-1 ring-cream-deep transition-all hover:-translate-y-1.5">
          <div class="absolute -left-10 -top-10 h-28 w-28 rounded-full bg-brand-50 transition-transform group-hover:scale-150"></div>
          <div class="relative">
            <span class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-500 text-white shadow-lg shadow-brand-500/30">
              <svg class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                @switch (m.icon) {
                  @case ('self') { <path d="M12 6.5C10.5 5.2 8.3 4.5 5 4.5V17c3.3 0 5.5.7 7 2 1.5-1.3 3.7-2 7-2V4.5c-3.3 0-5.5.7-7 2zM12 6.5V19"/> }
                  @case ('live') { <path d="M15 10l4.5-2.5v9L15 14M4 7h9a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V9a2 2 0 012-2z"/> }
                  @case ('inperson') { <path d="M9 11a3 3 0 100-6 3 3 0 000 6zm7 1a2.5 2.5 0 100-5 2.5 2.5 0 000 5zM3 20v-1a5 5 0 015-5h2a5 5 0 015 5v1M16 14h1a4 4 0 014 4v2"/> }
                }
              </svg>
            </span>
            <h3 class="mt-6 font-display text-xl font-extrabold text-navy-700">{{ m.title }}</h3>
            <p class="text-base font-semibold text-brand-600">{{ m.en }}</p>
            <p class="mt-3 text-lg leading-relaxed text-navy-600">{{ m.desc }}</p>
          </div>
        </div>
      }
    </div>

    <!-- AI banner -->
    <div appReveal class="animate-shimmer relative mt-10 overflow-hidden rounded-3xl bg-brand-500 p-8 shadow-xl shadow-brand-500/30 sm:p-10">
      <div class="flex flex-col items-center gap-6 text-center md:flex-row md:text-right">
        <span class="flex h-16 w-16 shrink-0 items-center justify-center rounded-2xl bg-white text-brand-600 shadow-lg">
          <svg class="h-8 w-8" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3l1.9 4.6L18.5 9l-4.6 1.9L12 15l-1.9-4.1L5.5 9l4.6-1.4L12 3zM6 16l.9 2.1L9 19l-2.1.9L6 22l-.9-2.1L3 19l2.1-.9L6 16zM18 14l.9 2.1L21 17l-2.1.9L18 20l-.9-2.1L15 17l2.1-.9L18 14z"/></svg>
        </span>
        <div class="flex-1">
          <h3 class="font-display text-xl font-extrabold text-white">{{ c().aiTitle }}</h3>
          <p class="mt-2 text-lg leading-relaxed text-white/90">
            {{ c().aiText }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
