<section id="audience" class="bg-cream py-24">
  <div class="container-page">
    <div appReveal class="mx-auto max-w-3xl text-center">
      <span class="text-sm font-bold uppercase tracking-wider text-brand-600">{{ c().eyebrow }}</span>
      <h2 class="mt-3 font-display text-3xl font-extrabold text-navy-700 sm:text-4xl">
        {{ c().title }}
      </h2>
    </div>

    <!-- tabs -->
    <div appReveal class="mt-12 flex flex-wrap justify-center gap-3">
      @for (r of c().roles; track r.key) {
        <button type="button" (click)="active.set(r.key)"
          class="inline-flex items-center gap-2 rounded-full px-6 py-3 text-sm font-bold transition-all cursor-pointer"
          [class]="active() === r.key
            ? 'bg-brand-500 text-white shadow-lg shadow-brand-500/30'
            : 'bg-white text-navy-700 ring-1 ring-cream-deep hover:bg-brand-50'">
          <app-icon [name]="r.icon" class="h-5 w-5" />
          {{ r.label }}
        </button>
      }
    </div>

    <!-- panel -->
    <div appReveal revealFrom="zoom" class="mt-10 grid items-center gap-10 rounded-[2rem] bg-white p-6 shadow-[0_20px_60px_-40px_rgba(14,46,68,0.4)] ring-1 ring-cream-deep lg:grid-cols-2 lg:p-10">
      <div class="animate-fade-up" [attr.key]="current().key">
        <h3 class="font-display text-2xl font-extrabold text-navy-700">{{ current().headline }}</h3>
        <p class="mt-3 text-lg leading-relaxed text-navy-600">{{ current().desc }}</p>
        <ul class="mt-6 space-y-3">
          @for (p of current().points; track p) {
            <li class="flex items-start gap-3 text-navy-600">
              <span class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-brand-50 text-brand-600">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              </span>
              <span class="text-lg leading-relaxed">{{ p }}</span>
            </li>
          }
        </ul>
      </div>

      <!-- role visual: animated role emblem -->
      <div class="relative flex justify-center">
        <div class="relative flex aspect-square w-full max-w-sm items-center justify-center">
          <!-- soft glow -->
          <div class="absolute inset-8 rounded-full bg-brand-500/25 blur-3xl"></div>

          <!-- orbiting rings -->
          <div class="animate-spin-slow absolute inset-2 rounded-full border border-dashed border-brand-200"></div>
          <div class="animate-spin-reverse absolute inset-14 rounded-full border border-cream-deep"></div>

          <!-- central role emblem (re-animates when the role changes) -->
          @for (r of [current()]; track r.key) {
            <div class="animate-fade-up relative flex h-40 w-40 flex-col items-center justify-center gap-2 rounded-[2.25rem] bg-brand-500 shadow-2xl shadow-brand-500/40 ring-1 ring-white/20">
              <app-icon [name]="r.icon" class="h-16 w-16 text-white" />
              <span class="px-3 text-center font-display text-sm font-extrabold text-white">{{ r.label }}</span>
            </div>
          }

          <!-- floating accent nodes -->
          <span class="node-pulse absolute right-8 top-10 h-3.5 w-3.5 rounded-full bg-brand-400"></span>
          <span class="node-pulse absolute left-12 top-16 h-2.5 w-2.5 rounded-full bg-teal" style="animation-delay:-1.2s"></span>
          <span class="node-pulse absolute right-16 bottom-14 h-2.5 w-2.5 rounded-full bg-brand-300" style="animation-delay:-0.6s"></span>

          <!-- floating icon chips -->
          <span class="animate-float absolute bottom-8 left-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-white text-brand-600 shadow-sm ring-1 ring-cream-deep">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          </span>
          <span class="animate-float absolute right-2 top-1/3 flex h-11 w-11 items-center justify-center rounded-2xl bg-white text-brand-600 shadow-sm ring-1 ring-cream-deep" style="animation-delay:-2.5s">
            <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3l2.6 6.3L21 10l-5 4 1.6 7L12 17l-5.6 4L8 14l-5-4 6.4-.7z"/></svg>
          </span>
        </div>
      </div>
    </div>
  </div>
</section>
