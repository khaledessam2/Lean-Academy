<section id="clients" class="bg-cream py-24">
  <div class="container-page">
    <div appReveal class="mx-auto max-w-3xl text-center">
      <span class="text-sm font-bold uppercase tracking-wider text-brand-600">{{ c().eyebrow }}</span>
      <h2 class="mt-3 font-display text-3xl font-extrabold text-navy-700 sm:text-4xl">
        {{ c().title }}
      </h2>
      <p class="mt-5 text-lg leading-relaxed text-navy-600">
        {{ c().intro }}
      </p>
    </div>

    <div class="mt-14 grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">
      @for (client of c().logos; track client.name; let i = $index) {
        <div [appReveal]="i" revealFrom="zoom" class="flex flex-col items-center justify-center gap-3 rounded-2xl bg-white px-4 py-6 text-center shadow-sm ring-1 ring-cream-deep transition-all hover:-translate-y-1 hover:shadow-lg">
          @if (client.logo) {
            <img [src]="client.logo" [alt]="client.name" loading="lazy"
              class="h-20 w-auto max-w-[85%] object-contain" />
          }
          <span class="font-display text-base sm:text-lg font-bold text-navy-600">{{ client.name }}</span>
        </div>
      }
    </div>

    <!-- testimonial -->
    <figure appReveal class="mx-auto mt-16 max-w-3xl rounded-3xl bg-white p-8 text-center shadow-[0_20px_60px_-40px_rgba(14,46,68,0.4)] ring-1 ring-cream-deep sm:p-12">
      <svg class="mx-auto h-10 w-10 text-brand-500" fill="currentColor" viewBox="0 0 24 24"><path d="M9 7H5a2 2 0 00-2 2v4a2 2 0 002 2h2v2a2 2 0 01-2 2H4v2h1a4 4 0 004-4V9a2 2 0 00-2-2h2zm10 0h-4a2 2 0 00-2 2v4a2 2 0 002 2h2v2a2 2 0 01-2 2h-1v2h1a4 4 0 004-4V9a2 2 0 00-2-2h2z"/></svg>
      <blockquote class="mt-6 font-display text-xl font-bold leading-relaxed text-navy-700 sm:text-2xl">
        {{ c().testimonialQuote }}
      </blockquote>
      <figcaption class="mt-6 text-navy-600">
        <span class="font-bold text-brand-600">{{ c().testimonialAuthor }}</span> — {{ c().testimonialRole }}
      </figcaption>
    </figure>
  </div>
</section>
