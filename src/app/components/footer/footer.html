<footer class="border-t border-cream-deep bg-cream pt-16 pb-8 text-navy-600">
  <div class="container-page">
    <div class="grid gap-10 lg:grid-cols-4">
      <div class="lg:col-span-1">
        <app-logo mark="#ec6623" textClass="text-navy-700" />
        <p class="mt-4 max-w-xs text-lg leading-relaxed text-navy-600">
          {{ c().blurb }}
        </p>
        <div class="mt-6 flex gap-3">
          @for (s of c().socials; track s.label) {
            <a [href]="s.href" target="_blank" [attr.aria-label]="s.label"
               class="flex h-10 w-10 items-center justify-center rounded-xl bg-white text-navy-600 ring-1 ring-cream-deep transition-all hover:bg-brand-500 hover:text-white">
              <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24">
                @switch (s.label) {
                  @case ('Facebook') { <path d="M13 10h3l.5-3H13V5.5c0-.9.3-1.5 1.6-1.5H16V1.2C15.7 1.1 14.6 1 13.4 1 11 1 9.5 2.4 9.5 5v2H7v3h2.5v9H13z"/> }
                  @case ('X') { <path d="M17.5 3h2.6l-5.7 6.5L21 21h-5.3l-4.1-5.4L6.8 21H4.2l6.1-7L3.3 3h5.4l3.7 4.9zM16.6 19.4h1.4L8.1 4.5H6.5z"/> }
                  @case ('Instagram') { <path d="M12 8.5A3.5 3.5 0 1012 15.5 3.5 3.5 0 0012 8.5zm0 5.7a2.2 2.2 0 110-4.4 2.2 2.2 0 010 4.4zM16 3H8a5 5 0 00-5 5v8a5 5 0 005 5h8a5 5 0 005-5V8a5 5 0 00-5-5zm3.5 13A3.5 3.5 0 0116 19.5H8A3.5 3.5 0 014.5 16V8A3.5 3.5 0 018 4.5h8A3.5 3.5 0 0119.5 8zm-3-8.4a.9.9 0 100 1.8.9.9 0 000-1.8z"/> }
                  @case ('LinkedIn') { <path d="M6.9 8.5H4V20h2.9zM5.4 4a1.7 1.7 0 100 3.4 1.7 1.7 0 000-3.4zM20 13.4c0-2.8-1.5-4.1-3.5-4.1a3 3 0 00-2.7 1.5V8.5H11V20h2.9v-6c0-1.6.3-3.1 2.2-3.1s1.9 1.8 1.9 3.2V20H20z"/> }
                }
              </svg>
            </a>
          }
        </div>
      </div>

      @for (col of c().columns; track col.title) {
        <div>
          <h4 class="font-display font-bold text-navy-700">{{ col.title }}</h4>
          <ul class="mt-4 space-y-2.5 text-lg">
            @for (l of col.links; track l.label) {
              <li>
                <a [routerLink]="[l.route]" [fragment]="l.fragment" class="text-navy-600 transition-colors hover:text-brand-600">{{ l.label }}</a>
              </li>
            }
          </ul>
        </div>
      }
    </div>

    <div class="mt-12 flex flex-col items-center justify-between gap-4 border-t border-cream-deep pt-6 text-sm text-navy-500 sm:flex-row">
      <p>© {{ c().year }} {{ c().copyright }}</p>
      <div class="flex gap-6">
        @for (b of c().bottomLinks; track b.label) {
          <a [href]="b.href" class="transition-colors hover:text-brand-600">{{ b.label }}</a>
        }
      </div>
    </div>
  </div>
</footer>
